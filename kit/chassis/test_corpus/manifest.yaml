# Ground-truth manifest for kit/chassis/test_corpus/
#
# Each entry declares which patterns SHOULD fire on the file (caught prose)
# or which patterns SHOULD NOT fire (clean prose). Mixed entries declare both.
#
# Pattern IDs match Pattern enum in kit/chassis/founder_romance_detector.py:
#   founder_romance, over_claim, stage_7_revival,
#   schedule_prose_substitution, carve_out_construction,
#   optimistic_probability, tame_reviewer_drift
#
# Status:
#   caught  — known caught artifact; listed patterns SHOULD fire
#   clean   — known clean artifact; listed patterns SHOULD NOT fire
#   mixed   — contains both caught and clean prose; listed patterns SHOULD fire
#             only on the lines explicitly tagged in the file body
#
# Provenance:
#   verbatim         — direct quote from extant source (file or memory)
#   verbatim-deleted — direct quote from a source that no longer exists (preserved in taxonomy table)
#   synthesized      — written for corpus; clearly marked in body
#   excerpt          — selected passage from an existing committed file

